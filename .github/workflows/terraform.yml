name: Terraform

on:
  push:
    branches: [main]
    paths: ['infra/terraform/**']
  pull_request:
    branches: [main]
    paths: ['infra/terraform/**']

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
      GOOGLE_PROJECT: vertexai-489303
      TF_LOG: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create plugin cache dir
        run: mkdir -p ${{ github.workspace }}/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.terraform.d/plugin-cache
          key: terraform-${{ hashFiles('infra/terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init
        timeout-minutes: 10

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color
        timeout-minutes: 15

  apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
      GOOGLE_PROJECT: vertexai-489303
      TF_LOG: INFO
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create plugin cache dir
        run: mkdir -p ${{ github.workspace }}/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.terraform.d/plugin-cache
          key: terraform-${{ hashFiles('infra/terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init
        timeout-minutes: 10

      - name: Terraform Apply
        run: terraform apply -auto-approve
        timeout-minutes: 30